name: Test dry-run with version prefix
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: action
        uses: .
        with:
          bump: major
          github_token: ${{ github.token }}
          dry_run: true
          prefix: "v"
      - name: Assert version_tag includes prefix
        env:
          VERSION: ${{ steps.action.outputs.version }}
          VERSION_TAG: ${{ steps.action.outputs.version_tag }}
        run: |
          echo "version: $VERSION"
          echo "version_tag: $VERSION_TAG"
          if [ -z "$VERSION_TAG" ]; then
            echo "FAIL: expected version_tag to be non-empty"
            exit 1
          fi
          if [[ "$VERSION_TAG" != v* ]]; then
            echo "FAIL: expected version_tag to start with 'v', got '$VERSION_TAG'"
            exit 1
          fi
          echo "PASS: version_tag is $VERSION_TAG"
