name: Test basic dry-run patch bump
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: action
        uses: .
        with:
          bump: patch
          github_token: ${{ github.token }}
          dry_run: true
      - name: Assert version output is set
        env:
          VERSION: ${{ steps.action.outputs.version }}
          VERSION_TAG: ${{ steps.action.outputs.version_tag }}
          VERSION_OPTIMISTIC: ${{ steps.action.outputs.version_optimistic }}
        run: |
          echo "version: $VERSION"
          echo "version_tag: $VERSION_TAG"
          echo "version_optimistic: $VERSION_OPTIMISTIC"
          if [ -z "$VERSION" ]; then
            echo "FAIL: expected version output to be non-empty"
            exit 1
          fi
          echo "PASS: version is $VERSION"
