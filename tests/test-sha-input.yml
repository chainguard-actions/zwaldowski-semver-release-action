name: Test dry-run with explicit SHA input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get current HEAD SHA
        id: get-sha
        run: |
          SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "HEAD SHA: $SHA"

      - id: action
        uses: .
        with:
          bump: minor
          github_token: ${{ github.token }}
          dry_run: true
          sha: ${{ steps.get-sha.outputs.sha }}

      - name: Assert version output is set
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: expected version output to be non-empty"
            exit 1
          fi
          echo "PASS"

      - name: Assert version_tag output is set
        env:
          VERSION_TAG: ${{ steps.action.outputs.version_tag }}
        run: |
          echo "version_tag: $VERSION_TAG"
          if [ -z "$VERSION_TAG" ]; then
            echo "FAIL: expected version_tag output to be non-empty"
            exit 1
          fi
          echo "PASS"
